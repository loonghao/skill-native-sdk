name: Release

# Triggered on every push to main.
# release-please opens/updates a "Release PR"; when that PR is merged,
# it creates a GitHub Release and this workflow builds + publishes to PyPI.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  id-token: write
  attestations: write
  actions: read

jobs:
  # ── Release Please ─────────────────────────────────────────────────────────
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name:        ${{ steps.release.outputs.tag_name }}
      version:         ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ── Build wheels (only when release-please created a release) ─────────────
  build-wheels:
    name: Build wheels
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/build-wheels.yml
    with:
      test-wheel: 'true'

  # ── Publish to PyPI via Trusted Publishers (no credentials needed) ─────────
  publish:
    name: Publish to PyPI
    needs: [release-please, build-wheels]
    if: |
      needs.release-please.outputs.release_created == 'true' &&
      needs.build-wheels.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/skill-native-sdk
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: List wheels to publish
        run: ls -la dist/

      # PyPI Trusted Publishers — no API token required
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          verbose: true
          print-hash: true

      - name: Attach wheels to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/*

  # ── Publish to crates.io ───────────────────────────────────────────────────
  # Publishes the 4 Rust sub-crates in strict dependency order.
  # The root package (cdylib Python extension) is excluded (publish = false).
  #
  # Dependency order:
  #   skill-schema               (no internal deps)
  #     └─ skill-core            (→ skill-schema)
  #          └─ skill-runtime    (→ skill-schema, skill-core)
  #               └─ skill-cli  (→ skill-schema, skill-core, skill-runtime)
  publish-crates:
    name: Publish to crates.io
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # ── 1. skill-schema ────────────────────────────────────────────────────
      - name: Publish skill-schema
        run: cargo publish -p skill-schema
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # crates.io index propagation delay (typically 20–40 s)
      - name: Wait for skill-schema to propagate
        run: sleep 40

      # ── 2. skill-core ──────────────────────────────────────────────────────
      - name: Publish skill-core
        run: cargo publish -p skill-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for skill-core to propagate
        run: sleep 40

      # ── 3. skill-runtime ───────────────────────────────────────────────────
      - name: Publish skill-runtime
        run: cargo publish -p skill-runtime
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for skill-runtime to propagate
        run: sleep 40

      # ── 4. skill-cli ───────────────────────────────────────────────────────
      - name: Publish skill-cli
        run: cargo publish -p skill-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
