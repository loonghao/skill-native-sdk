name: Build Wheels

# Called by release.yml when release-please creates a release.
# Can also be triggered manually via workflow_dispatch.

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      test-wheel:
        required: false
        type: string
        default: 'true'

concurrency:
  group: build-wheels-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── ABI3 builds (Python 3.10+) — one wheel per OS works for all 3.10+ ──

  linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-wheel
        with:
          target: x86_64
          python-version: '3.12'
          artifact-name: wheels-linux-x86_64

  linux-aarch64:
    name: Linux aarch64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-wheel
        with:
          target: aarch64
          python-version: '3.12'
          artifact-name: wheels-linux-aarch64
          # Cross-compilation: skip smoke test (can't run aarch64 on x86_64)
          test-wheel: 'false'

  windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-wheel
        with:
          target: x64
          python-version: '3.12'
          artifact-name: wheels-windows-x64

  macos:
    name: macOS universal2
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-wheel
        with:
          target: universal2-apple-darwin
          python-version: '3.12'
          maturin-args: '--release --out dist --sdist --find-interpreter --features python-bindings,ext-module,abi3-py310'
          artifact-name: wheels-macos-universal2

  # ── Source distribution ────────────────────────────────────────────────────
  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: dist/*.tar.gz
          retention-days: 30
