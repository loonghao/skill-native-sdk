coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 5%

flags:
  rust:
    paths:
      - crates/
      - src/
    carryforward: true
  python:
    paths:
      - python/
    carryforward: true

ignore:
  - "tests/"
  - "skills/examples/"
